<!DOCTYPE html>
<html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Parker - Search</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#111;overflow:hidden}
#map{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0}

/* Fat bottom bar */
#bar{position:fixed;bottom:0;left:0;right:0;z-index:1000;background:rgba(0,0,0,0.92);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-top:2px solid #444;padding:6px 10px;display:flex;align-items:center;gap:8px;touch-action:manipulation}
#bar .loc{background:#d22;border:none;color:#fff;padding:12px 18px;border-radius:10px;font-size:15px;font-weight:bold;cursor:pointer;flex-shrink:0;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
#bar .loc:active{background:#a11}
#bar .info{flex:1;font-size:14px;color:#fff;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
#bar .info .sm{font-size:11px;color:#888;margin-left:4px}
#bar .gear{background:#333;border:1px solid #666;color:#fff;padding:12px 14px;border-radius:10px;font-size:22px;cursor:pointer;flex-shrink:0;line-height:1;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
#bar .gear:active{background:#444}

/* Sliding panel */
#panel{position:fixed;top:0;right:0;z-index:2000;width:240px;height:100vh;background:rgba(0,0,0,0.94);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transform:translateX(100%);transition:transform 0.2s;padding:14px;border-left:2px solid #444;overflow-y:auto}
#panel.open{transform:translateX(0)}
#panel h2{font-size:15px;color:#fff;margin-bottom:8px;border-bottom:1px solid #333;padding-bottom:6px}
#panel .x{position:absolute;top:8px;right:10px;background:none;border:none;color:#999;font-size:22px;cursor:pointer;padding:4px 8px;-webkit-tap-highlight-color:transparent}
.sw{display:flex;align-items:center;gap:10px;padding:8px 2px;border-bottom:1px solid #222;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.sw:active{background:rgba(255,255,255,0.04)}
.sw .knob{width:42px;height:24px;border-radius:12px;flex-shrink:0;position:relative;border:1px solid #555;transition:0.12s}
.sw .knob.on{background:#3a7;border-color:#3a7}
.sw .knob.off{background:#2a2a2a;border-color:#444}
.sw .knob::after{content:'';position:absolute;top:2px;width:18px;height:18px;border-radius:9px;background:#fff;transition:0.12s}
.sw .knob.on::after{right:2px}
.sw .knob.off::after{left:2px}
.sw .t{flex:1}
.sw .t .l{font-size:13px;color:#ddd}
.sw .t .d{font-size:10px;color:#666;display:block}

.leaflet-popup-content-wrapper{background:#111!important;color:#fff!important;border:1px solid #444;border-radius:8px!important}
.leaflet-popup-tip{background:#111!important;border:1px solid #444}
</style>
</head>
<body>
<div id="map"></div>
<div id="bar">
  <button class="loc" onclick="locateMe()">📍</button>
  <div class="info" id="info">near Travis Cres<span class="sm" id="dist"></span></div>
  <button class="gear" onclick="panel()">⚙</button>
</div>
<div id="panel">
  <button class="x" onclick="panel()">✕</button>
  <h2>Show on map:</h2>
  <div id="toggles"></div>
</div>
<script>
// ═══ MAP ═══
const map=L.map('map',{center:[51.101,-114.058],zoom:16,zoomControl:false,attributionControl:false});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
L.control.zoom({position:'bottomleft'}).addTo(map);

// ═══ LAYERS ═══
const LZ={
  spots:L.layerGroup().addTo(map),  // hide spots ON by default
  zone:L.layerGroup().addTo(map),   // zone ON by default
  route:L.layerGroup(),             // route OFF
  heat:L.layerGroup(),              // heat OFF
  labels:L.layerGroup()             // labels OFF
};

// ── Nose Creek (always on) ──
const nc=[];for(let i=0;i<=30;i++){let t=i/30;nc.push([51.090+t*(51.074-51.090),-114.059+t*(-114.049+114.059)+0.005*Math.sin(t*7)])}
L.polyline(nc,{color:'#4a8',weight:4,opacity:0.35});

// ── Zone 1 (500m) ──
L.circle([51.101,-114.058],{radius:500,color:'#f44',fillColor:'#f44',fillOpacity:0.04,weight:2,opacity:0.4}).addTo(LZ.zone);

// ── Hide spots ──
[[51.0863,-114.0575,'Pipe under McKnight bridge'],[51.0845,-114.0565,'Big pipe Nose Creek'],[51.0852,-114.0585,'Storm drain McKnight'],[51.0825,-114.0555,'Hidden pipe'],[51.0985,-114.0565,'Culvert under path'],[51.0990,-114.0575,'Metal pipe into creek'],[51.1005,-114.0550,'Storm pond drain'],[51.0860,-114.0572,'Under McKnight bridge'],[51.1015,-114.0535,'Roadside ditch'],[51.0875,-114.0545,'Concrete pipe']].forEach(d=>{
L.circleMarker([d[0],d[1]],{radius:8,color:'#fd4',fillColor:'#fd4',fillOpacity:0.9,weight:2}).addTo(LZ.spots)
.bindPopup('<b style=color:#fd4>▼ '+d[2]+'</b><br><span style=color:#f44>Check INSIDE!</span>')});

// ── Route (OFF) ──
const rt=[{la:51.0851,lo:-114.0932},{la:51.0855,lo:-114.0800},{la:51.0855,lo:-114.0624},{la:51.0855,lo:-114.0624},{la:51.1010,lo:-114.0580}];
['#fd6','#fa3','#fa3','#f44'].forEach((c,i)=>{let p1=rt[i],p2=rt[i+1],dx=p2.la-p1.la,dy=p2.lo-p1.lo,w=i===3?5:3;for(let s=0;s<30;s+=2){let t1=s/30,t2=Math.min((s+1)/30,1);L.polyline([[p1.la+dx*t1,p1.lo+dy*t1],[p1.la+dx*t2,p1.lo+dy*t2]],{color:c,weight:w,opacity:0.8}).addTo(LZ.route)}});

// ── Heat (OFF) ──
L.circle([51.101,-114.058],{radius:400,color:'#f44',fillColor:'#f22',fillOpacity:0.15,weight:1,opacity:0.2}).addTo(LZ.heat);
L.circle([51.086,-114.057],{radius:400,color:'#fa2',fillColor:'#fa2',fillOpacity:0.1,weight:1,opacity:0.15}).addTo(LZ.heat);
L.circle([51.092,-114.050],{radius:600,color:'#fa2',fillColor:'#fa2',fillOpacity:0.07,weight:1,opacity:0.1}).addTo(LZ.heat);

// ── Labels (OFF) ──
function lb(h,la,lo){L.marker([la,lo],{icon:L.divIcon({className:'',html:h,iconSize:[0,0]})}).addTo(LZ.labels)}

// BIG last seen label (always visible)
L.circleMarker([51.101,-114.058],{radius:16,color:'#f44',fillColor:'#f44',fillOpacity:0.9,weight:3,interactive:false});
lb('<div style="background:#c33;padding:4px 10px;border-radius:8px;font-size:15px;color:#fff;border:2px solid #fff;font-weight:bold;box-shadow:0 2px 12px rgba(0,0,0,0.9)">🚨 LAST SEEN 12:52</div>',51.103,-114.058);

// Labels that are OFF by default
lb('<span style="background:rgba(0,0,0,0.85);padding:2px 6px;border-radius:4px;font-size:12px;color:#fd6">🏡 Day Home 11:08</span>',51.084,-114.091);
lb('<span style="background:rgba(0,0,0,0.85);padding:2px 6px;border-radius:4px;font-size:12px;color:#fd6">👕 Clothing ~12:00</span>',51.083,-114.079);
lb('<span style="background:rgba(0,0,0,0.85);padding:2px 6px;border-radius:4px;font-size:12px;color:#fd6">📹 CCTV 12:34-47</span>',51.087,-114.062);
lb('<span style="background:rgba(0,0,0,0.85);padding:2px 8px;border-radius:5px;font-size:13px;color:#f44;border:1px solid #f44">🔴 ZONE 1 500m</span>',51.0925,-114.060);
lb('<span style="background:rgba(0,0,0,0.7);padding:1px 5px;border-radius:3px;font-size:10px;color:#aaa">🏫 Thorncliffe School</span>',51.103,-114.067);

// ═══ TOGGLES ═══
const TD=[
  {id:'spots',label:'Hide spots (pipes)',desc:'▼ 10 locations',on:true},
  {id:'zone',label:'Zone 1 (500m)',desc:'Red search area',on:true},
  {id:'route',label:"Parker's route",desc:'Walk → brisk → RUN',on:false},
  {id:'heat',label:'Probability heat',desc:'Hotspot zones',on:false},
  {id:'labels',label:'All labels',desc:'Names & markers',on:false}
];
const tc=document.getElementById('toggles');
TD.forEach(t=>{
  const r=document.createElement('div');r.className='sw';
  const k=document.createElement('div');k.className='knob '+(t.on?'on':'off');
  const tl=document.createElement('div');tl.className='t';
  tl.innerHTML='<span class="l">'+t.label+'</span><span class="d">'+t.desc+'</span>';
  r.appendChild(k);r.appendChild(tl);
  r.onclick=function(){
    const on=k.classList.contains('on');
    k.classList.remove('on','off');k.classList.add(on?'off':'on');
    if(on)map.removeLayer(LZ[t.id]);else map.addLayer(LZ[t.id]);
  };
  tc.appendChild(r);
});

function panel(){document.getElementById('panel').classList.toggle('open')}
function locateMe(){
  map.locate({setView:true,maxZoom:17,enableHighAccuracy:true});
  map.on('locationfound',function(e){
    L.circleMarker(e.latlng,{radius:14,fillColor:'#4af',color:'#fff',weight:3,fillOpacity:0.9}).addTo(map).bindPopup('<b>You</b>').openPopup();
    gdist(e.latlng.lat,e.latlng.lng)
  });
  map.on('locationerror',function(){alert('Phone GPS must be ON. Allow location in browser settings.')})
}
function gdist(lat,lon){
  const d=dist(lat,lon,51.101,-114.058);
  document.getElementById('info').innerHTML=(d<0.5?'<b>IN ZONE 1!</b> search now':d<1?'IN ZONE 2 - '+(d*1000).toFixed(0)+'m':d.toFixed(1)+' km away')+'<span class="sm"> from Travis Cres</span>';
}
function dist(l1,n1,l2,n2){const R=6371;const a=Math.sin((l2-l1)*(Math.PI/180)/2)**2+Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin((n2-n1)*(Math.PI/180)/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}
map.on('moveend',function(){const c=map.getCenter();gdist(c.lat,c.lng)});
</script>
</body>
</html>
