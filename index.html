<!DOCTYPE html>
<html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Parker - Search</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#111;overflow:hidden}
#map{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0}
#bar{position:fixed;bottom:0;left:0;right:0;z-index:1000;background:rgba(0,0,0,0.92);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-top:2px solid #444;padding:6px 10px;display:flex;align-items:center;gap:8px;touch-action:manipulation}
#bar .loc{background:#d22;border:none;color:#fff;padding:12px 18px;border-radius:10px;font-size:15px;font-weight:bold;cursor:pointer;flex-shrink:0;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
#bar .loc:active{background:#a11}
#bar .info{flex:1;font-size:14px;color:#fff;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding:0 4px}
#bar .info .sm{font-size:11px;color:#888;margin-left:4px}
#bar .gear{background:#333;border:1px solid #666;color:#fff;padding:12px 14px;border-radius:10px;font-size:22px;cursor:pointer;flex-shrink:0;line-height:1;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
#bar .gear:active{background:#444}
#panel{position:fixed;top:0;right:0;z-index:2000;width:250px;height:100vh;background:rgba(0,0,0,0.94);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transform:translateX(100%);transition:transform 0.2s;padding:14px;border-left:2px solid #444;overflow-y:auto}
#panel.open{transform:translateX(0)}
#panel h2{font-size:15px;color:#fff;margin-bottom:6px;border-bottom:1px solid #333;padding-bottom:6px}
#panel .x{position:absolute;top:8px;right:10px;background:none;border:none;color:#999;font-size:22px;cursor:pointer;padding:4px 8px;-webkit-tap-highlight-color:transparent}
.sw{display:flex;align-items:center;gap:10px;padding:8px 2px;border-bottom:1px solid #222;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.sw:active{background:rgba(255,255,255,0.04)}
.sw .knob{width:42px;height:24px;border-radius:12px;flex-shrink:0;position:relative;border:1px solid #555;transition:0.12s}
.sw .knob.on{background:#3a7;border-color:#3a7}
.sw .knob.off{background:#2a2a2a;border-color:#444}
.sw .knob::after{content:'';position:absolute;top:2px;width:18px;height:18px;border-radius:9px;background:#fff;transition:0.12s}
.sw .knob.on::after{right:2px}
.sw .knob.off::after{left:2px}
.sw .t{flex:1}
.sw .t .l{font-size:13px;color:#ddd}
.sw .t .d{font-size:10px;color:#666;display:block}
.leaflet-popup-content-wrapper{background:#111!important;color:#fff!important;border:1px solid #444;border-radius:8px!important}
.leaflet-popup-tip{background:#111!important;border:1px solid #444}
.section{font-size:11px;color:#888;margin:10px 0 4px 2px;text-transform:uppercase;letter-spacing:1px}
</style>
</head>
<body>
<div id="map"></div>
<div id="bar">
  <button class="loc" onclick="locateMe()">📍</button>
  <div class="info" id="info">Travis Cres<span class="sm" id="dist"></span></div>
  <button class="gear" onclick="panel()">⚙</button>
</div>
<div id="panel">
  <button class="x" onclick="panel()">✕</button>
  <h2>Layers</h2>
  <div id="toggles"></div>
  <div class="section">Parker's Behavior</div>
  <div style="font-size:11px;color:#888;padding:6px 2px;line-height:1.5">
    Parker is <b style="color:#fff">autistic, non-verbal</b> with noise-cancelling headphones.<br>
    He will <b style="color:#4af">seek water</b> and <b style="color:#4a8">quiet green spaces</b>.<br>
    He will <b style="color:#f84">avoid loud roads</b>.<br>
    He is likely <b style="color:#fd4">hiding in a pipe or drain</b>.
  </div>
</div>
<script>
const map=L.map('map',{center:[51.101,-114.058],zoom:15.5,zoomControl:false,attributionControl:false});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
L.control.zoom({position:'bottomleft'}).addTo(map);

const LZ={
  water:L.layerGroup().addTo(map),
  quiet:L.layerGroup().addTo(map),
  noisy:L.layerGroup().addTo(map),
  spots:L.layerGroup().addTo(map),
  zone:L.layerGroup().addTo(map),
  route:L.layerGroup(),
  labels:L.layerGroup()
};

// ═══ Nose Creek ═══
const nc=[];for(let i=0;i<=35;i++){let t=i/35;nc.push([51.092+t*(51.072-51.092),-114.059+t*(-114.049+114.059)+0.005*Math.sin(t*8)])}
L.polyline(nc,{color:'#3af',weight:4,opacity:0.5}).addTo(LZ.water);
L.marker([51.083,-114.055],{icon:L.divIcon({iconSize:[0,0],html:'<span style="background:rgba(0,0,0,0.7);color:#3af;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:bold;border:1px solid #3af">💧 NOSE CREEK</span>'})}).addTo(LZ.water);

// 💧 Water features
[[51.0996,-114.0528,'Greenview Storm Pond','Large pond with drainage inlets. Dark, quiet, near houses.'],
 [51.0878,-114.0494,'Nose Creek Pond','Wide section of creek with deep banks. Shaded by trees.'],
 [51.0838,-114.0475,'Creek Water','Nose Creek widens here. Overgrown banks, secluded.'],
 [51.0815,-114.0540,'Drainage Outflow','Neighborhood drains empty into creek. Pipes + water.'],
 [51.0790,-114.0500,'Nose Creek Bend','Creek bends south. Steep banks, thick bushes, very quiet.'],
 [51.0770,-114.0480,'South Creek Pool','Deeper water, overgrown.'],
 [51.1005,-114.0550,'Storm Pond Inlet','Drainage pipe feeding into Greenview pond. Dark pipe opening.'],
 [51.0990,-114.0575,'Creek Culvert','Metal pipe discharging into Nose Creek. Can crawl inside.'],
 [51.0875,-114.0545,'Concrete Outfall','Large concrete pipe end near McKnight.']].forEach(d=>{
  L.circle([d[0],d[1]],{radius:20,color:'#3af',fillColor:'#3af',fillOpacity:0.6,weight:2}).addTo(LZ.water);
  L.marker([d[0]+0.0012,d[1]],{icon:L.divIcon({iconSize:[0,0],html:'<span style="background:rgba(0,0,0,0.85);color:#3af;padding:1px 4px;border-radius:2px;font-size:8px">💧 '+d[2]+'</span>'})}).addTo(LZ.water)
  .bindPopup('<b style=color:#3af>💧 '+d[2]+'</b><br><span style=color:#ccc>'+d[3]+'</span><br><span style=color:#f44;font-size:11px><b>Parker would go here</b></span>');
});

// 🌿 Quiet green
[[51.1045,-114.0533,'Laycock Park','Full park, trees, playground to hide under.'],
 [51.1028,-114.0581,'Travis Cres Park','Neighborhood park. Directly near last seen.'],
 [51.1014,-114.0581,'Green Space','Grass and bushes between houses. Good hiding.'],
 [51.0997,-114.0601,'Thorncliffe Park','Playground. Tunnels, cubbies.'],
 [51.1038,-114.0613,'Recreation Ground','Open field. Sheds on edge.'],
 [51.0980,-114.0628,'Green Area','Tree-covered patch. Underbrush.'],
 [51.0923,-114.0519,'Thorncliffe Green','Large grassy area with trees. Quiet.'],
 [51.0919,-114.0565,'Central Green','Community green space. Central location.'],
 [51.0975,-114.0565,'Nose Creek Park','Park along creek. Trees + water = ideal.'],
 [51.0968,-114.0522,'Creek Meadow','Open grassy area beside Nose Creek.'],
 [51.1002,-114.0530,'Greenview Park','Small park. Sheds and bushes.'],
 [51.0935,-114.0674,'Highland Golf (Closed)','Abandoned golf course. Overgrown, completely secluded.'],
 [51.0891,-114.0604,'Thorncliffe Park','Park near Centre St. Trees, benches.'],
 [51.0853,-114.0660,'Buchanan School Green','School grounds. Playground structures.']].forEach(d=>{
  L.circle([d[0],d[1]],{radius:28,color:'#3a8',fillColor:'#3a8',fillOpacity:0.25,weight:1}).addTo(LZ.quiet);
  L.marker([d[0]+0.001,d[1]],{icon:L.divIcon({iconSize:[0,0],html:'<span style="background:rgba(0,0,0,0.8);color:#3a8;padding:1px 3px;border-radius:2px;font-size:8px">🌿 '+d[2]+'</span>'})}).addTo(LZ.quiet)
});

// 🔊 Noise (OFF)
[['McKnight Blvd',[[51.085,-114.09],[51.085,-114.04]]],['Deerfoot Tr',[[51.104,-114.045],[51.066,-114.045]]],['Centre St N',[[51.108,-114.062],[51.060,-114.062]]],['16 Ave N',[[51.066,-114.09],[51.066,-114.04]]],['Barlow Tr',[[51.098,-114.038],[51.076,-114.038]]]].forEach(d=>{
  L.polyline(d[1],{color:'#f84',weight:6,opacity:0.12}).addTo(LZ.noisy);
  L.polyline(d[1],{color:'#f84',weight:1.5,opacity:0.2,dashArray:'4,4'}).addTo(LZ.noisy);
});

// Zone 1
L.circle([51.101,-114.058],{radius:500,color:'#f44',fillColor:'#f44',fillOpacity:0.02,weight:2,opacity:0.3}).addTo(LZ.zone);

// ══════════════════════════════════════
// 📍 CORRECTED LOCATIONS (all verified)
// ══════════════════════════════════════

// 1) DAY HOME - Connaught Dr NW (51.0851, -114.0932)
L.circleMarker([51.0851,-114.0932],{radius:7,color:'#fd6',fillColor:'#fd6',fillOpacity:0.8,weight:2}).addTo(LZ.zone);
L.marker([51.0851,-114.0932],{icon:L.divIcon({iconSize:[0,0],html:'<div style="background:#fd6;color:#000;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:bold;border:1px solid #fff">🏡 Day Home 11:08-11:41</div>'})}).addTo(LZ.zone);

// 2) CLOTHING FOUND - Northmount Dr NW (51.0855, -114.080)
L.circleMarker([51.0855,-114.080],{radius:7,color:'#fd6',fillColor:'#fd6',fillOpacity:0.8,weight:2}).addTo(LZ.zone);
L.marker([51.0855,-114.080],{icon:L.divIcon({iconSize:[0,0],html:'<div style="background:#fd6;color:#000;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:bold;border:1px solid #fff">👕 Clothing ~12:00</div>'})}).addTo(LZ.zone);

// 3) CCTV - McKnight/Centre St N TRAFFIC CAMERA (51.0855, -114.0624)
L.circleMarker([51.0855,-114.0624],{radius:6,color:'#fd6',fillColor:'#fd6',fillOpacity:0.8,weight:2}).addTo(LZ.zone);
L.marker([51.0855,-114.0624],{icon:L.divIcon({iconSize:[0,0],html:'<div style="background:#fd6;color:#000;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:bold;border:1px solid #fff">📹 Traffic cam 12:34-47</div>'})}).addTo(LZ.zone);

// 4) 367 CENTRE ST N - BUSINESS CCTV
L.circleMarker([51.087,-114.061],{radius:9,color:'#f44',fillColor:'#f44',fillOpacity:0.8,weight:3}).addTo(LZ.zone);
L.marker([51.087,-114.061],{icon:L.divIcon({iconSize:[0,0],html:'<div style="background:#d22;color:#fff;padding:3px 8px;border-radius:6px;font-size:13px;font-weight:bold;border:2px solid #ff0;box-shadow:0 2px 8px rgba(0,0,0,0.8)">📷 367 Centre St N - Business CCTV</div>'})}).addTo(LZ.zone);

// 5) LAST SEEN 12:52 - Travis Cres
L.circleMarker([51.101,-114.058],{radius:18,color:'#f44',fillColor:'#f44',fillOpacity:0.9,weight:3,interactive:false});
L.marker([51.103,-114.058],{icon:L.divIcon({iconSize:[0,0],html:'<div style="background:#c33;padding:4px 10px;border-radius:8px;font-size:16px;color:#fff;border:2px solid #fff;font-weight:bold;box-shadow:0 2px 12px rgba(0,0,0,0.9)">🚨 LAST SEEN 12:52 Travis Cres</div>'})});

// Hide spots
[[51.0863,-114.0575],[51.0845,-114.0565],[51.0852,-114.0585],[51.0825,-114.0555],
 [51.0985,-114.0565],[51.0990,-114.0575],[51.1005,-114.0550],[51.0860,-114.0572],
 [51.1015,-114.0535],[51.0875,-114.0545]].forEach(d=>{
L.circleMarker([d[0],d[1]],{radius:6,color:'#fd4',fillColor:'#fd4',fillOpacity:0.8,weight:2}).addTo(LZ.spots)});

// Route (OFF)
const rt=[{la:51.0851,lo:-114.0932},{la:51.0855,lo:-114.0800},{la:51.0855,lo:-114.0624},{la:51.0870,lo:-114.0610},{la:51.1010,lo:-114.0580}];
['#fd6','#fa3','#fa3','#f44'].forEach((c,i)=>{let p1=rt[i],p2=rt[i+1],dx=p2.la-p1.la,dy=p2.lo-p1.lo,w=i===3?5:3;for(let s=0;s<30;s+=2){let t1=s/30,t2=Math.min((s+1)/30,1);L.polyline([[p1.la+dx*t1,p1.lo+dy*t1],[p1.la+dx*t2,p1.lo+dy*t2]],{color:c,weight:w,opacity:0.8}).addTo(LZ.route)}});

// Labels (OFF)
function lb(h,la,lo){L.marker([la,lo],{icon:L.divIcon({className:'',html:h,iconSize:[0,0]})}).addTo(LZ.labels)}
lb('<span style="background:rgba(0,0,0,0.85);padding:2px 8px;border-radius:5px;font-size:13px;color:#f44;border:1px solid #f44">🔴 ZONE 1 500m</span>',51.092,-114.060);
lb('<span style="background:rgba(0,0,0,0.85);padding:2px 6px;border-radius:4px;font-size:12px;color:#fd6">1. Walk 1.7 km/h</span>',51.083,-114.086);
lb('<span style="background:rgba(0,0,0,0.85);padding:2px 6px;border-radius:4px;font-size:12px;color:#fa3">2. Brisk 2.1 km/h</span>',51.084,-114.070);
lb('<span style="background:rgba(0,0,0,0.85);padding:2px 6px;border-radius:4px;font-size:12px;color:#f44;font-weight:bold">3. RUN to Travis Cres!</span>',51.095,-114.062);

// Toggles
const TD=[
  {id:'water',label:'💧 Water (ponds, creeks)',desc:'He would seek water',on:true},
  {id:'quiet',label:'🌿 Quiet green spaces',desc:'Parks, trees, no traffic',on:true},
  {id:'noisy',label:'🔊 Noise (avoid)',desc:'Loud roads he would flee',on:false},
  {id:'spots',label:'Hide spots (pipes)',desc:'▼ 10 locations to check',on:true},
  {id:'zone',label:'Zone + locations',desc:'Red zone & markers',on:true},
  {id:'route',label:"Parker's route",desc:'Walk → brisk → RUN north',on:false},
  {id:'labels',label:'All labels',desc:'Names & zone markers',on:false}
];
const tc=document.getElementById('toggles');
TD.forEach(t=>{
  const r=document.createElement('div');r.className='sw';
  const k=document.createElement('div');k.className='knob '+(t.on?'on':'off');
  const tl=document.createElement('div');tl.className='t';
  tl.innerHTML='<span class="l">'+t.label+'</span><span class="d">'+t.desc+'</span>';
  r.appendChild(k);r.appendChild(tl);
  r.onclick=function(){
    const on=k.classList.contains('on');
    k.classList.remove('on','off');k.classList.add(on?'off':'on');
    if(on)map.removeLayer(LZ[t.id]);else map.addLayer(LZ[t.id]);
  };
  tc.appendChild(r);
});

function panel(){document.getElementById('panel').classList.toggle('open')}
function locateMe(){
  map.locate({setView:true,maxZoom:17,enableHighAccuracy:true});
  map.on('locationfound',function(e){
    L.circleMarker(e.latlng,{radius:14,fillColor:'#4af',color:'#fff',weight:3,fillOpacity:0.9}).addTo(map).bindPopup('<b>You</b>').openPopup();
    gdist(e.latlng.lat,e.latlng.lng)
  });
  map.on('locationerror',function(){alert('Phone GPS must be ON. Allow location in browser settings.')})
}
function gdist(lat,lon){
  const d=dist(lat,lon,51.101,-114.058);
  document.getElementById('info').innerHTML=(d<0.5?'<b>IN ZONE 1!</b> search now':d<1?'IN ZONE 2 '+(d*1000).toFixed(0)+'m':d.toFixed(1)+' km')+'<span class="sm"> from Travis</span>';
}
function dist(l1,n1,l2,n2){const R=6371;const a=Math.sin((l2-l1)*(Math.PI/180)/2)**2+Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin((n2-n1)*(Math.PI/180)/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}
map.on('moveend',function(){const c=map.getCenter();gdist(c.lat,c.lng)});
</script>
</body>
</html>
