<!DOCTYPE html>
<html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Parker Search Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#111;color:#fff;overflow:hidden}
#map{width:100vw;height:100vh;position:fixed;top:0;left:0;z-index:0}
#controls{position:fixed;top:10px;right:10px;z-index:1000;background:rgba(0,0,0,0.88);border-radius:10px;padding:10px;border:1px solid #555;max-height:85vh;overflow-y:auto;width:170px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
#controls h3{color:#fff;font-size:13px;margin-bottom:6px;border-bottom:1px solid #444;padding-bottom:4px}
.toggle-group{margin:2px 0}
.toggle-row{display:flex;align-items:center;padding:5px 4px;border-radius:6px;cursor:pointer;transition:background 0.1s;gap:6px;font-size:12px;color:#ccc;-webkit-tap-highlight-color:transparent}
.toggle-row:active{background:rgba(255,255,255,0.08)}
.toggle-row .sw{width:36px;height:20px;border-radius:10px;flex-shrink:0;position:relative;border:1px solid #666;transition:all 0.15s}
.toggle-row .sw.on{background:#4a7;border-color:#4a7}
.toggle-row .sw.off{background:#333;border-color:#555}
.toggle-row .sw::after{content:'';position:absolute;top:2px;width:14px;height:14px;border-radius:7px;background:#fff;transition:all 0.15s}
.toggle-row .sw.on::after{right:2px}
.toggle-row .sw.off::after{left:2px}
.toggle-row .lbl{flex:1}
.toggle-row .lbl .sub{font-size:9px;color:#777;display:block;margin-top:-1px}
.locbtn{display:block;width:100%;padding:8px;margin-top:8px;border:none;border-radius:8px;background:#c33;color:#fff;font-size:13px;font-weight:bold;cursor:pointer;-webkit-tap-highlight-color:transparent}
.locbtn:active{background:#a22}
hr{border:none;border-top:1px solid #333;margin:5px 0}
</style>
</head>
<body>
<div id="map"></div>
<div id="controls">
<h3>&#9881; Layers</h3>
<div class="toggle-group" id="toggles"></div>
<hr/>
<button class="locbtn" onclick="locateMe()">&#128205; My Location</button>
</div>
<script>
const map=L.map('map',{center:[51.096,-114.065],zoom:14,zoomControl:false,attributionControl:false});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
const sat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19});
L.control.zoom({position:'bottomright'}).addTo(map);

// Create ALL layers
const layers={
  route:L.layerGroup().addTo(map),
  heat:L.layerGroup().addTo(map),
  hideouts:L.layerGroup().addTo(map),
  zone1:L.layerGroup().addTo(map),
  zone2:L.layerGroup().addTo(map),
  drive:L.layerGroup().addTo(map),
  labels:L.layerGroup().addTo(map),
  creek:L.layerGroup().addTo(map),
  rings:L.layerGroup().addTo(map)
};

// ── Nose Creek ──
const nc=[];for(let i=0;i<=30;i++){let t=i/30;nc.push([51.090+t*(51.074-51.090),-114.059+t*(-114.049+114.059)+0.005*Math.sin(t*7)])}
L.polyline(nc,{color:'#3a8',weight:5,opacity:0.5}).addTo(layers.creek);

// ── Heat zones @ Travis Cres ──
L.circle([51.101,-114.058],{radius:400,color:'#f22',fillColor:'#f22',fillOpacity:0.2,weight:2,opacity:0.4}).addTo(layers.heat);
L.circle([51.098,-114.056],{radius:300,color:'#f22',fillColor:'#f22',fillOpacity:0.15,weight:2,opacity:0.4}).addTo(layers.heat);
L.circle([51.086,-114.057],{radius:350,color:'#fa2',fillColor:'#fa2',fillOpacity:0.12,weight:1,opacity:0.3}).addTo(layers.heat);
L.circle([51.102,-114.062],{radius:300,color:'#fa2',fillColor:'#fa2',fillOpacity:0.12,weight:1,opacity:0.3}).addTo(layers.heat);
L.circle([51.092,-114.050],{radius:500,color:'#fa2',fillColor:'#fa2',fillOpacity:0.08,weight:1,opacity:0.2}).addTo(layers.heat);

// ── Distance rings ──
L.circle([51.101,-114.058],{radius:2400,color:'#f66',fill:false,weight:1.5,opacity:0.25,dashArray:'6,6'}).addTo(layers.rings);
L.circle([51.101,-114.058],{radius:4800,color:'#f84',fill:false,weight:1.5,opacity:0.15,dashArray:'6,6'}).addTo(layers.rings);

// ── Route ──
const rt=[{la:51.0851,lo:-114.0932},{la:51.0855,lo:-114.0800},{la:51.0855,lo:-114.0624},{la:51.0855,lo:-114.0624},{la:51.1010,lo:-114.0580}];
['#fd6','#fa3','#fa3','#f44'].forEach((c,i)=>{let p1=rt[i],p2=rt[i+1],dx=p2.la-p1.la,dy=p2.lo-p1.lo,w=i===3?7:4;for(let s=0;s<30;s+=2){let t1=s/30,t2=Math.min((s+1)/30,1);L.polyline([[p1.la+dx*t1,p1.lo+dy*t1],[p1.la+dx*t2,p1.lo+dy*t2]],{color:c,weight:w,opacity:0.85}).addTo(layers.route)}});

// ── Zone 1 ──
L.circle([51.101,-114.058],{radius:500,color:'#f44',fillColor:'#f22',fillOpacity:0.06,weight:2,opacity:0.6}).addTo(layers.zone1);
// ── Zone 2 ──
L.circle([51.101,-114.058],{radius:1000,color:'#f84',fillColor:'#f62',fillOpacity:0.03,weight:1.5,opacity:0.4,dashArray:'5,5'}).addTo(layers.zone2);

// ── Labels ──
const mk=function(h,lats,lons){L.marker([lats,lons],{icon:L.divIcon({html:h,iconSize:[0,0]})}).addTo(layers.labels)};
mk('<div style="background:#fd6;color:#000;padding:2px 5px;border-radius:3px;font-size:10px;font-weight:bold">Day Home 11:08</div>',51.0854,-114.0915);
mk('<div style="background:#fd6;color:#000;padding:2px 5px;border-radius:3px;font-size:10px;font-weight:bold">Clothing ~12:00</div>',51.0845,-114.079);
mk('<div style="background:#fd6;color:#000;padding:2px 5px;border-radius:3px;font-size:10px;font-weight:bold">CCTV 12:34-12:47</div>',51.088,-114.063);
mk('<div style="background:#f44;color:#fff;padding:3px 7px;border-radius:4px;font-size:12px;font-weight:bold;border:2px solid #fff">&#128680; LAST SEEN 12:52 Travis Cres</div>',51.1025,-114.058);
mk('<div style="background:rgba(0,0,0,0.8);color:#aaa;padding:2px 6px;border-radius:3px;font-size:9px;border:1px solid #666">Thorncliffe School</div>',51.1021,-114.0666);
mk('<div style="background:rgba(0,0,0,0.8);color:#aaa;padding:2px 6px;border-radius:3px;font-size:9px;border:1px solid #666">Greenview Centre</div>',51.1018,-114.0618);
mk('<div style="background:rgba(0,0,0,0.85);color:#fd6;padding:2px 6px;border-radius:3px;font-size:9px">1. Walk 1.7km/h</div>',51.083,-114.086);
mk('<div style="background:rgba(0,0,0,0.85);color:#fa3;padding:2px 6px;border-radius:3px;font-size:9px">2. Brisk 2.1km/h</div>',51.084,-114.070);
mk('<div style="background:rgba(0,0,0,0.85);color:#f44;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:bold">3. RUN 9.6km/h!</div>',51.093,-114.061);
mk('<div style="background:rgba(0,0,0,0.8);color:#f44;padding:2px 5px;border-radius:3px;font-size:10px;font-weight:bold;border:1px solid #f44">ZONE 1 Walk 500m</div>',51.093,-114.060);
mk('<div style="background:rgba(0,0,0,0.8);color:#f84;padding:2px 5px;border-radius:3px;font-size:10px;font-weight:bold;border:1px solid #f84">ZONE 2 Walk 1km</div>',51.088,-114.060);

// ── Hide spots ──
[[51.0863,-114.0575,'DRAIN PIPE','Under McKnight bridge'],[51.0845,-114.0565,'CULVERT','Big pipe Nose Creek'],[51.0852,-114.0585,'STORM DRAIN','Deep ditch McKnight'],[51.0825,-114.0555,'PIPE','Overgrown hidden pipe'],[51.0985,-114.0565,'CULVERT','Large pipe under path'],[51.0990,-114.0575,'PIPE','Metal outlet into creek'],[51.1005,-114.0550,'STORM POND','Greenview pond inlets'],[51.0860,-114.0572,'BRIDGE','Dark under McKnight'],[51.1015,-114.0535,'DITCH','Roadside culvert'],[51.0875,-114.0545,'OUTFALL','Concrete pipe south']].forEach(d=>{
L.marker([d[0],d[1]],{icon:L.divIcon({html:'<div style="background:#fd4;color:#000;width:22px;height:22px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.6)">▼</div>',iconSize:[22,22],iconAnchor:[11,11]})}).addTo(layers.hideouts)
.bindPopup('<b style=color:#fd4>'+d[2]+'</b><br><span style=color:#ccc>'+d[3]+'</span><br><span style=color:#f66;font-size:11px><b>Check INSIDE the pipe!</b></span>');
L.marker([d[0]+0.0008,d[1]],{icon:L.divIcon({html:'<div style="background:rgba(0,0,0,0.8);color:#fd4;padding:1px 4px;border-radius:2px;font-size:9px;white-space:nowrap">'+d[2]+'</div>',iconSize:[0,0]})}).addTo(layers.hideouts)});

// ── Drive patrol ──
[['McKnight Blvd',[[51.085,-114.105],[51.085,-114.035]]],['Centre St N',[[51.108,-114.062],[51.060,-114.062]]],['32 Ave NE',[[51.078,-114.090],[51.078,-114.035]]],['Deerfoot Tr',[[51.106,-114.045],[51.066,-114.045]]],['16 Ave N',[[51.066,-114.095],[51.066,-114.035]]],['Barlow Tr',[[51.098,-114.038],[51.076,-114.038]]]].forEach(d=>{L.polyline(d[1],{color:'#48f',weight:5,opacity:0.3}).addTo(layers.drive);
let m=[(d[1][0][0]+d[1][1][0])/2,(d[1][0][1]+d[1][1][1])/2];
L.marker(m,{icon:L.divIcon({html:'<div style="background:rgba(0,0,0,0.7);color:#48f;padding:1px 4px;border-radius:2px;font-size:9px;font-weight:bold">DRIVE '+d[0]+'</div>',iconSize:[0,0]})}).addTo(layers.drive)});

// ── Layer toggle UI ──
const toggleDefs=[
  {id:'heat',label:'Probability heat',sub:'Red=high, orange=medium',def:true},
  {id:'zone1',label:'Zone 1 walk (500m)',sub:'Immediate search area',def:true},
  {id:'zone2',label:'Zone 2 walk (1km)',sub:'Extended search area',def:true},
  {id:'route',label:"Parker's route",sub:'Walk  walk  RUN',def:true},
  {id:'hideouts',label:'Hide spots',sub:'10 pipes/culverts/drains',def:true},
  {id:'creek',label:'Nose Creek corridor',sub:'Green pathway',def:true},
  {id:'rings',label:'Distance rings',sub:'2.4km & 4.8km radius',def:false},
  {id:'drive',label:'Drive patrol roads',sub:'Blue = drive slowly',def:true},
  {id:'labels',label:'All labels',sub:'Names, signs, markers',def:true}
];

const tg=document.getElementById('toggles');
toggleDefs.forEach(t=>{
  const row=document.createElement('div');
  row.className='toggle-row';
  row.dataset.layer=t.id;
  const sw=document.createElement('div');
  sw.className='sw '+(t.def?'on':'off');
  const lb=document.createElement('div');
  lb.className='lbl';
  lb.innerHTML=t.label+'<span class="sub">'+t.sub+'</span>';
  row.appendChild(sw);
  row.appendChild(lb);
  row.onclick=function(){
    const isOn=sw.classList.contains('on');
    sw.classList.remove('on','off');
    sw.classList.add(isOn?'off':'on');
    if(isOn)map.removeLayer(layers[t.id]);
    else map.addLayer(layers[t.id]);
  };
  tg.appendChild(row);
});

function locateMe(){map.locate({setView:true,maxZoom:16,enableHighAccuracy:true});
map.on('locationfound',function(e){L.circleMarker(e.latlng,{radius:9,fillColor:'#4af',color:'#fff',weight:3,fillOpacity:0.9}).addTo(map);L.popup().setLatLng(e.latlng).setContent('<b>You</b>').openOn(map)});
map.on('locationerror',function(){alert('Enable GPS + allow location in browser settings')})}

// Clean zoom
map.on('popupopen',function(e){map.setView(e.target._popup._latlng,map.getZoom()+0.5,{animate:true})});
</script>
</body>
</html>
